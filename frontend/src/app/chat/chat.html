@if (!joined) {
  <div class="join">
    <h2>Rejoindre le chat</h2>
    <form (submit)="join(); $event.preventDefault()">
      <input
        type="text"
        [(ngModel)]="username"
        name="username"
        placeholder="Ton pseudo..."
        autocomplete="off"
      />
      <button type="submit">Entrer</button>
    </form>
  </div>
} @else {
  <div class="chat">
    <ul class="messages">
      @for (msg of messages(); track $index) {
        <li [class.mine]="msg.username === username" [class.ai]="msg.username === 'SQLock IA'">
          <div class="msg-header">
            <strong>{{ msg.username }}</strong>
            @if (msg.created_at) {
              <span class="timestamp">{{ msg.created_at | date:'dd/MM/yy HH:mm' }}</span>
            }
          </div>
          <span>{{ msg.text }}</span>
        </li>
      } @empty {
        <li class="empty">Aucun message pour l'instant.</li>
      }
    </ul>

    <form class="composer" (submit)="send(); $event.preventDefault()">
      <input
        type="text"
        [(ngModel)]="draft"
        name="draft"
        placeholder="Écris un message..."
        autocomplete="off"
      />
      <button type="submit">Envoyer</button>
      <button type="button" class="ai-toggle" (click)="toggleAiPanel()" title="Demander à l'IA">
        🤖
      </button>
    </form>

    @if (aiPanelOpen) {
      <form class="ai-panel" (submit)="askAi(); $event.preventDefault()">
        <input
          type="text"
          [(ngModel)]="aiQuestion"
          name="aiQuestion"
          placeholder="Pose ta question à SQLock IA..."
          autocomplete="off"
        />
        <button type="submit" [disabled]="aiLoading">
          @if (aiLoading) { Réflexion... } @else { Demander }
        </button>
      </form>
    }
  </div>
}
